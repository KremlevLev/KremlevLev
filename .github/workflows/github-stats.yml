name: GitHub Stats
on:
  schedule:
    - cron: '0 */6 * * *' # Обновление каждые 6 часов
  workflow_dispatch: # Позволяет запускать вручную
jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Официальный генератор картинок от создателей проекта
      - uses: anuraghazra/github-readme-stats-action@v2
        with:
          username: KremlevLev
          theme: radical
          show_icons: true
          include_all_commits: true
          count_private: true

      # Автоматический пуш сгенерированных SVG-картинок обратно в репозиторий
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Update GitHub Stats"
          git push
